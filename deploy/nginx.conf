# The site's nginx rules, to paste into Laravel Forge's own config for
# klad.ozdemir.be (Sites → klad.ozdemir.be → Edit Files → Nginx Configuration),
# inside the existing `server` block that Forge generates.
#
# Kept in the repository rather than only on the server so the rules that make
# the site work are reviewable, and so rebuilding the box is a paste rather
# than an excavation.
#
# The site is static: GitHub Actions builds it and rsyncs the result (see
# .github/workflows/docs.yml). Nothing here runs PHP, so Forge's default
# `location ~ \.php$` block can go.

index index.html;

# VitePress is built with `cleanUrls: true`: links have no extension, but the
# files on disk DO (`/guide/sizing` is `guide/sizing.html`). Without the
# `$uri.html` arm every page but the home page is a 404 — which is the one
# mistake this whole file exists to prevent. `$uri/index.html` covers the
# directory-style routes, the embedded playground included.
location / {
    try_files $uri $uri.html $uri/index.html =404;
}

# Hashed filenames: the content of `/assets/index-C_N1-Io6.js` can never
# change, so it is safe to cache for a year and never revalidate. This is
# where a static site gets most of its speed.
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# The playground is a separate Vite build copied in under this path. Its own
# assets are hashed too and covered by the rule above; this only makes sure the
# bare directory serves its entry.
location = /playground/ {
    try_files /playground/index.html =404;
}

# Everything else — HTML, the sitemap, the OG images — is unhashed and must
# revalidate, or a deploy leaves people reading yesterday's page.
location ~* \.(html|xml|txt|json)$ {
    add_header Cache-Control "public, max-age=0, must-revalidate";
}

# The 404 VitePress builds, so a wrong URL still looks like the site.
error_page 404 /404.html;

# Small, plain-text-heavy responses compress well and this site is almost
# entirely those. Forge enables gzip globally; these are the types it does not
# cover by default.
gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml
    application/xml;
