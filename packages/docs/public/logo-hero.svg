<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="OrgChart">
  <!--
    A hierarchy read as a cascade rather than as a diagram: three nodes, each
    smaller and lighter than the one it hangs from, stepping down and to the
    right. Asymmetric on purpose — a centred parent with balanced children is
    the shape every site-map glyph already has.

    The gradients are shallow, one stop of lightness each. They give the
    shapes a direction to be lit from without becoming the point of the mark.

    Everything is filled blue rather than outlined, so it works on a light or
    a dark page unchanged: this is loaded as an <img> and page CSS cannot
    reach inside it.
  -->
  <defs>
    <linearGradient id="oc-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8" />
      <stop offset="1" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="oc-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="oc-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa" />
      <stop offset="1" stop-color="#93c5fd" />
    </linearGradient>
  </defs>

  <g fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round">
    <path d="M14 19v5.75a2.5 2.5 0 0 0 2.5 2.5H17" />
    <path d="M25.5 33v4.25a2.5 2.5 0 0 0 2.5 2.5H28" />
  </g>

  <rect x="4" y="6" width="20" height="13" rx="4.5" fill="url(#oc-a)" />
  <rect x="17" y="21.5" width="17" height="11.5" rx="4" fill="url(#oc-b)" />
  <rect x="28" y="35" width="14" height="9.5" rx="3.5" fill="url(#oc-c)" />
</svg>
